# docker-compose.yml
# Purpose: Define the multi-container app, fix ownership for host ./logs, and ensure services have correct permissions for hot-reloading and logging.
#          Persist backend Python packages across `down`/`up` by bind-mounting ./backend/.venv, and keep frontend node_modules in a named volume.
# Imports From: ./backend/Dockerfile, ./frontend/Dockerfile
# Exported To: The Docker daemon and local ./logs folder for persisted logs.
services:
  # Ensure host ./logs is owned by ${UID:-1000}:${GID:-1000} before others start.
  log-perms:
    image: alpine:3.20
    user: "0:0"
    working_dir: /logs
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /logs
        if [ -f /logs ]; then
          echo "Error: /logs exists as a file; expected a directory" >&2
          exit 1
        fi
        chown -R ${UID:-1000}:${GID:-1000} /logs
        chmod -R u+rwX,g+rwX /logs
        echo "log-perms: fixed ownership to UID=${UID:-1000} GID=${GID:-1000}"
    volumes:
      - ./logs:/logs

  backend:
    # Run as the host user's UID:GID so edits to bind mounts are owned by you.
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: ./backend
    depends_on:
      log-perms:
        condition: service_completed_successfully
    environment:
      - HOME=/tmp
      - UV_CACHE_DIR=/tmp/uv-cache
      - PIP_CACHE_DIR=/tmp/pip-cache
      - LOG_DIR=/logs
    ports:
      - "${HOST_BACKEND_PORT:-8000}:8000"
    volumes:
      # App source and lockfiles (hot reload + lock sync)
      - ./backend/app:/app/app
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
      # Persist the virtualenv so runtime-installed deps survive container recreation
      - ./backend/.venv:/app/.venv
      # Shared logs directory
      - ./logs:/logs
    # Ensure the project venv exists & is synced on each start, then run the app.
    command: >
      sh -lc "
        uv venv >/dev/null 2>&1 || true &&
        uv sync --frozen || uv sync &&
        exec uv run uvicorn app.bootstrap:asgi --host 0.0.0.0 --port 8000 --reload --log-config /app/uvicorn-log.json
      "

  frontend:
    # This service starts as root to fix permissions for node_modules, then steps down.
    build:
      context: ./frontend
    depends_on:
      log-perms:
        condition: service_completed_successfully
    command: >
      sh -lc "
        mkdir -p /app/node_modules &&
        chown -R ${UID:-1000}:${GID:-1000} /app/node_modules &&
        exec su-exec ${UID:-1000}:${GID:-1000} pnpm run dev
      "
    ports:
      - "${HOST_FRONTEND_PORT:-5173}:5173"
    environment:
      - WATCHPACK_POLLING=true
    volumes:
      # Project source (hot reload)
      - ./frontend:/app
      # Make backend source visible to Vite at /app/backend (for full reload on backend changes)
      - ./backend:/app/backend
      # Use a named volume for node_modules (persists across down/up)
      - frontend_node_modules:/app/node_modules
      # Shared logs directory
      - ./logs:/logs

volumes:
  frontend_node_modules:
