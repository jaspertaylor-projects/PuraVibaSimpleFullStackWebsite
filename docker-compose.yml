# docker-compose.yml
# Purpose: Define the multi-container app and mount a shared /logs directory so both containers can write error logs.
# Imports From: ./backend/Dockerfile, ./frontend/Dockerfile
# Exported To: The Docker daemon and local ./logs folder for persisted logs.
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Syncs local backend code with the container for uvicorn's --reload
      - ./backend/app:/app/app
      # Shared logs directory mounted in both services
      - ./logs:/logs

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      # Ensures Vite's watcher works reliably in Docker
      - WATCHPACK_POLLING=true
    volumes:
      # Syncs local frontend code with the container
      - ./frontend:/app
      # Makes backend code visible to Vite at /app/backend
      - ./backend:/app/backend
      # Prevents local node_modules from overwriting the container's
      - /app/node_modules
      # Shared logs directory mounted in both services
      - ./logs:/logs
